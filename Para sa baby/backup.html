<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let angle = 0;
  let beat = 0;

  const text = "I love you baby";
  const centerText = "miss u po maria";

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2 - canvas.height * 0.07;

    beat += 0.07;
    const pulse = (Math.sin(beat) + 1) / 2;

    const baseScale = Math.min(canvas.width, canvas.height) / 32;
    const scale = baseScale * (1 + 0.1 * pulse);

    const r = Math.round(255 - 120 * pulse);
    const g = Math.round(51 + 20 * pulse);
    const b = Math.round(128 + 80 * pulse);

    const numSteps = 70;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Glow layer
    if (pulse > 0.1) {
      ctx.save();
      ctx.shadowColor = `rgb(180, 80, 255)`;
      ctx.shadowBlur = 20 + 30 * pulse;
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = `rgba(255, ${g}, ${b}, ${0.3 * pulse})`;
      for (let i = 0; i < numSteps; i++) {
        const t = i * (2 * Math.PI / numSteps) + (angle * Math.PI / 180);
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        ctx.fillText(text, x * scale + cx, -y * scale + cy);
      }
      ctx.restore();
    }

    // Main heart text with glow
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.shadowColor = `rgb(180, 80, 255)`;
    ctx.shadowBlur = 4 + 10 * pulse;
    for (let i = 0; i < numSteps; i++) {
      const t = i * (2 * Math.PI / numSteps) + (angle * Math.PI / 180);
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      ctx.fillText(text, x * scale + cx, -y * scale + cy);
    }
    ctx.shadowBlur = 0;

    // Center text with heartbeat animation
    const centerScale = 1 + 0.08 * pulse;
const centerSize = 22;
    const centerR = Math.round(255 - 120 * pulse);
    const centerG = Math.round(51 + 20 * pulse);
    const centerB = Math.round(128 + 80 * pulse);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(centerScale, centerScale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Center glow layer
    ctx.shadowColor = `rgb(180, 80, 255)`;
    ctx.shadowBlur = 10 + 30 * pulse;
    ctx.font = `bold ${centerSize}px sans-serif`;
    ctx.fillStyle = `rgba(255, ${centerG}, ${centerB}, ${0.3 * pulse})`;
    ctx.fillText(centerText, 0, 0);

    // Center main text
    ctx.shadowBlur = 6 + 15 * pulse;
    ctx.fillStyle = `rgb(${centerR}, ${centerG}, ${centerB})`;
    ctx.fillText(centerText, 0, 0);

    ctx.restore();

    angle += 0.09;
    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
