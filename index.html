<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love You</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Playfair Display', serif; }
    canvas { display: block; position: absolute; top: 0; left: 0; }

    #intro {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 40px; z-index: 10;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #intro .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    #intro .particle {
      position: absolute; border-radius: 50%;
      animation: floatUp var(--dur) linear infinite;
      animation-delay: var(--delay); left: var(--x); bottom: -10px;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; } 90% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
    }
    .intro-sub {
      font-family: 'Dancing Script', cursive; color: rgba(255,100,180,0.55);
      font-size: clamp(14px,3vw,20px); letter-spacing: 0.25em; text-transform: uppercase;
      animation: fadeInDown 1.2s ease 0.2s both;
    }
    .intro-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(36px,10vw,80px); color: #fff;
      text-align: center; line-height: 1.1;
      animation: fadeInDown 1.2s ease 0.5s both;
    }
    .intro-title span {
      background: linear-gradient(135deg,#ff4da6,#ff80cc,#cc44ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .heart-preview {
      font-size: clamp(32px,8vw,60px);
      animation: heartbeat 1.1s ease-in-out infinite, fadeInDown 1.2s ease 0.8s both;
      filter: drop-shadow(0 0 12px rgba(255,60,130,0.8)); line-height: 1;
    }
    @keyframes heartbeat {
      0%,100%{transform:scale(1);} 14%{transform:scale(1.18);}
      28%{transform:scale(1);} 42%{transform:scale(1.12);} 70%{transform:scale(1);}
    }
    .press-btn {
      position: relative; cursor: pointer; border: none;
      background: none; padding: 0; animation: fadeInUp 1.2s ease 1.1s both;
    }
    .press-btn .btn-inner {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg,#b5006e,#ff4da6,#cc44ff);
      color: #fff; font-family: 'Playfair Display', serif;
      font-size: clamp(15px,3.5vw,22px); font-weight: 700;
      letter-spacing: 0.08em; padding: 18px 42px; border-radius: 60px;
      position: relative; z-index: 1;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .press-btn:hover .btn-inner { transform: scale(1.05); box-shadow: 0 0 30px 8px rgba(255,60,160,0.45); }
    .press-btn:active .btn-inner { transform: scale(0.97); }
    .press-btn::before {
      content: ''; position: absolute; inset: -6px; border-radius: 60px;
      background: transparent; border: 2px solid rgba(255,100,200,0.5);
      animation: ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:.7;} 50%{transform:scale(1.1);opacity:.2;} }
    .btn-icon { font-size: 1.2em; line-height: 1; }
    .hint {
      font-family: 'Dancing Script', cursive; color: rgba(255,255,255,0.3);
      font-size: clamp(12px,2.5vw,16px);
      animation: breathe 3s ease-in-out infinite, fadeInUp 1.2s ease 1.4s both;
    }
    @keyframes breathe { 0%,100%{opacity:0.3;} 50%{opacity:0.6;} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-24px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fadeInUp   { from{opacity:0;transform:translateY(24px);}  to{opacity:1;transform:translateY(0);} }
    #flash {
      position: fixed; inset: 0;
      background: radial-gradient(circle,#ff4da6 0%,transparent 70%);
      z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.15s ease;
    }
    #flash.burst { opacity: 0.7; transition: opacity 0.05s ease; }
  </style>
</head>
<body>

<div id="flash"></div>
<canvas id="c"></canvas>

<div id="intro">
  <div class="particles" id="particles"></div>
  
  <h1 class="intro-title">For <span>Baby</span></h1>
  <div class="heart-preview">💗</div>
  <button class="press-btn" id="startBtn" aria-label="Open surprise">
    <div class="btn-inner"><span class="btn-icon">💌</span> Press to open</div>
  </button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ── INTRO PARTICLES ──────────────────────────────────────
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.setProperty('--x', Math.random() * 100 + 'vw');
  p.style.setProperty('--dur', (6 + Math.random() * 10) + 's');
  p.style.setProperty('--delay', (Math.random() * 10) + 's');
  const sz = 2 + Math.random() * 5;
  p.style.width = sz + 'px'; p.style.height = sz + 'px';
  p.style.background = `hsla(${300 + Math.random()*60},100%,70%,0.7)`;
  particlesEl.appendChild(p);
}

// ── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── HEART MATH ────────────────────────────────────────────
function heartXY(t) {
  return {
    x:  16 * Math.pow(Math.sin(t), 3),
    y:  13 * Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)
  };
}
function heartPoint(t, scale, cx, cy) {
  const h = heartXY(t);
  return { x: h.x * scale + cx, y: -h.y * scale + cy };
}

// ── COLOR ─────────────────────────────────────────────────
function heartColor(t) {
  return [
    Math.round(135 + 120 * t),
    Math.round(51  + 20  * Math.sin(t * Math.PI)),
    Math.round(128 + 80  * (1 - t))
  ];
}

// ── STATE ─────────────────────────────────────────────────
const NUM_SLOTS  = 80;
const text       = "I love you baby";
const centerText = "miss u po ";

let phase        = 'idle';
let angle        = 0;
let beat         = 0;
let heartOpacity = 0;

// ── SPRAY SLOTS (GSAP-driven, like the Three.js reference) ──
// Each slot holds a plain {x,y} object that GSAP tweens from center → dest.
// The canvas reads x,y each frame — no phase math needed.
const slots = [];
let sprayDone = false; // flips true when all tweens have finished

function initSlots() {
  slots.length = 0;
  sprayDone    = false;
  beat         = 0;
  heartOpacity = 0;
  angle        = 0;

  const cx = canvas.width  / 2;
  const cy = canvas.height / 2 - canvas.height * 0.07;
  const bs = Math.min(canvas.width, canvas.height) / 32;

  // GSAP timeline — no yoyo, plays once then leaves particles on the heart
  const tl = gsap.timeline({
    onComplete: () => { sprayDone = true; }
  });

  let completedCount = 0;

  for (let i = 0; i < NUM_SLOTS; i++) {
    const t    = i * (2 * Math.PI / NUM_SLOTS);
    const dest = heartPoint(t, bs, cx, cy);
    const col  = heartColor(Math.random());

    // Particle starts at heart center
    const pt = { x: cx, y: cy, col, dest, trail: [] };
    slots.push(pt);

    // GSAP tween: power2.inOut from center → heart position
    // staggered by path position (same formula as the Three.js reference: i * 0.002 * ~50)
    tl.to(pt, {
      x: dest.x,
      y: dest.y,
      ease: 'power2.inOut',
      duration: 1.5 + Math.random() * 2.5,
      onComplete: () => {
        completedCount++;
        // Start fading in the text heart once most particles have landed
        if (completedCount >= NUM_SLOTS * 0.7 && heartOpacity === 0) {
          heartOpacity = 0.001; // triggers the ramp-up
        }
      }
    }, i * 0.018); // stagger delay along path, like reference's `i * 0.002`
  }
}

// ── RENDER LOOP ───────────────────────────────────────────
function draw(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (phase === 'idle') { requestAnimationFrame(draw); return; }

  const cx = canvas.width  / 2;
  const cy = canvas.height / 2 - canvas.height * 0.07;
  const bs = Math.min(canvas.width, canvas.height) / 32;

  // ── DRAW SPRAY DOTS (GSAP controls x/y) ────────────────
  if (!sprayDone || heartOpacity < 1) {
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    for (const s of slots) {
      // Trail
      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > 10) s.trail.shift();

      for (let ti = 0; ti < s.trail.length - 1; ti++) {
        const frac = (ti + 1) / s.trail.length;
        ctx.beginPath();
        ctx.arc(s.trail[ti].x, s.trail[ti].y, Math.max(0.3, 2 * frac), 0, Math.PI*2);
        ctx.fillStyle = `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${frac * 0.35})`;
        ctx.fill();
      }

      // Glowing dot — fades out as the text heart fades in
      const dotAlpha = Math.max(0, 1 - heartOpacity);
      ctx.save();
      ctx.globalAlpha  = dotAlpha;
      ctx.shadowColor  = `rgb(${s.col[0]},${s.col[1]},${s.col[2]})`;
      ctx.shadowBlur   = 10;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `rgb(${s.col[0]},${s.col[1]},${s.col[2]})`;
      ctx.fill();
      ctx.restore();
    }
  }

  // ── TEXT HEART (fades in once particles land) ───────────
  if (heartOpacity > 0) {
    beat += 0.07;
    const pulse = (Math.sin(beat) + 1) / 2;
    const scale = bs * (1 + 0.1 * pulse);

    const r = Math.round(255 - 120 * pulse);
    const g = Math.round(51  +  20 * pulse);
    const b = Math.round(128 +  80 * pulse);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Glow layer
    if (pulse > 0.1) {
      ctx.save();
      ctx.globalAlpha = heartOpacity;
      ctx.shadowColor = 'rgb(180,80,255)';
      ctx.shadowBlur  = 20 + 30 * pulse;
      ctx.font        = 'bold 16px sans-serif';
      ctx.fillStyle   = `rgba(255,${g},${b},${0.3 * pulse})`;
      for (let i = 0; i < NUM_SLOTS; i++) {
        const t  = i * (2*Math.PI/NUM_SLOTS) + (angle * Math.PI/180);
        const pt = heartPoint(t, scale, cx, cy);
        ctx.fillText(text, pt.x, pt.y);
      }
      ctx.restore();
    }

    // Main text ring
    ctx.save();
    ctx.globalAlpha = heartOpacity;
    ctx.font        = 'bold 16px sans-serif';
    ctx.fillStyle   = `rgb(${r},${g},${b})`;
    ctx.shadowColor = 'rgb(180,80,255)';
    ctx.shadowBlur  = 4 + 10 * pulse;
    for (let i = 0; i < NUM_SLOTS; i++) {
      const t  = i * (2*Math.PI/NUM_SLOTS) + (angle * Math.PI/180);
      const pt = heartPoint(t, scale, cx, cy);
      ctx.fillText(text, pt.x, pt.y);
    }
    ctx.shadowBlur = 0;
    ctx.restore();

    // Center message
    const cScale = 1 + 0.08 * pulse;
    ctx.save();
    ctx.globalAlpha  = heartOpacity;
    ctx.translate(cx, cy);
    ctx.scale(cScale, cScale);
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = 'rgb(180,80,255)';
    ctx.shadowBlur   = 10 + 30 * pulse;
    ctx.font         = 'bold 22px sans-serif';
    ctx.fillStyle    = `rgba(255,${g},${b},${0.3 * pulse})`;
    ctx.fillText(centerText, 0, 0);
    ctx.shadowBlur   = 6 + 15 * pulse;
    ctx.fillStyle    = `rgb(${r},${g},${b})`;
    ctx.fillText(centerText, 0, 0);
    ctx.restore();

    // Ramp up opacity
    if (heartOpacity < 1) heartOpacity = Math.min(1, heartOpacity + 0.008);
    angle += 0.09;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);

// ── BUTTON ────────────────────────────────────────────────
const intro    = document.getElementById('intro');
const flash    = document.getElementById('flash');
const startBtn = document.getElementById('startBtn');

startBtn.addEventListener('click', () => {
  flash.classList.add('burst');
  setTimeout(() => {
    flash.classList.remove('burst');
    flash.style.transition = 'opacity 0.8s ease';
    flash.style.opacity = '0';
  }, 80);

  intro.classList.add('hidden');

  initSlots();
  phase = 'spray';
});
</script>
</body>
</html>
